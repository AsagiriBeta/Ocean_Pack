id: SEA_PICKLES
type: FEATURE

distributor:
  type: SAMPLER
  sampler:
    type: POSITIVE_WHITE_NOISE
    salt: 7777
  # 与海草等水下特征一致；0.8 叠加 1/6 结构权重后整体过稀，容易「完全看不到」
  threshold: 0.5

locator:
  type: PATTERN
  range:
    min: 0
    max: 62
  pattern:
    type: AND
    patterns:
      - type: MATCH
        block: minecraft:water
        offset: 0
      - type: MATCH_SET
        blocks: $features/vegetation/meta.yml:sea-pickle-support-blocks
        offset: -1

structures:
  distribution:
    type: DOMAIN_WARP
    amplitude: 3
    warp:
      type: GAUSSIAN
    sampler:
      type: OPEN_SIMPLEX_2
      frequency: 0.04
    salt: 8888
  structures:
    - sea_pickles: 2
    - blank: 4

